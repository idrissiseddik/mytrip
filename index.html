<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>في طريقك - طلب رحلة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-green: #2E7D32; --dark-bg: #121212; --card-bg: #1E1E1E; --text-color: #e0e0e0; --input-bg: #2c2c2c; --label-color: #b0b0b0; --admin-red: #d32f2f; --expired-bg: #3d1a1a; --expired-border: #8b0000; --completed-bg: #3d2a1a; --completed-border: #b85a00; }
        * { box-sizing: border-box; }
        body { background-color: var(--dark-bg); color: var(--text-color); font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        label, .form-label, .small.text-muted { color: var(--label-color) !important; }
        ::placeholder { color: #666 !important; opacity: 1; }
        .app-header { background: linear-gradient(45deg, var(--primary-green), #1b5e20); padding: 25px 20px; border-radius: 0 0 25px 25px; text-align: center; margin-bottom: 20px; color: white; position: relative; }
        .admin-trigger { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.5); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .admin-trigger.active { background: var(--admin-red); color: white; animation: pulse 2s infinite; }
        .custom-card { background-color: var(--card-bg); border: none; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .form-control { background-color: var(--input-bg); border: 1px solid #444; color: white !important; border-radius: 10px; padding: 12px; }
        .form-control:focus { background-color: #333; border-color: var(--primary-green); box-shadow: none; }
        .btn-success-custom { background-color: var(--primary-green); border: none; border-radius: 10px; padding: 12px 20px; font-weight: bold; color: white; width: 100%; }
        .btn-success-custom:hover { background-color: #1b5e20; color: white; }
        .contact-btn { width: 45px; height: 45px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; text-decoration: none; color: white; margin: 0 5px; transition: all 0.3s ease; }
        .contact-btn:hover { transform: scale(1.1); color: white; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: #007bff; }
        .btn-complete { background-color: #ff8f00; }
        .route-display { font-size: 1.2rem; font-weight: 800; color: white; margin-bottom: 5px; }
        .route-label { color: #a5d6a7; font-weight: bold; margin: 0 4px; }
        .route-arrow { color: var(--primary-green); margin: 0 8px; }
        .time-badge { background-color: rgba(46, 125, 50, 0.2); color: #81c784; padding: 4px 10px; border-radius: 8px; font-size: 0.9rem; display: inline-block; margin-top: 5px; }
        .admin-delete-btn { background-color: rgba(211, 47, 47, 0.1); color: #ff5252; border: 1px solid rgba(211, 47, 47, 0.3); width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; font-weight: bold; }
        .admin-delete-btn:hover { background-color: var(--admin-red); color: white; }
        .app-footer { position: fixed; bottom: 0; width: 100%; background-color: #0f0f0f; color: #777; text-align: center; padding: 12px; font-size: 0.8rem; border-top: 1px solid #333; z-index: 1000; }
        .hidden { display: none !important; }
        .nav-tabs { border-bottom: 1px solid #444; }
        .nav-link { color: #aaa; border: none; font-weight: bold; }
        .nav-link.active { background: transparent; color: var(--primary-green) !important; border-bottom: 2px solid var(--primary-green); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; display:flex; justify-content:center; align-items:center; }
        .req-badge { background-color: #ff9800; color: #000; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-right: 8px; }
        .custom-card.expired { background-color: var(--expired-bg) !important; border: 2px solid var(--expired-border) !important; opacity: 0.85; }
        .custom-card.expired .route-display { color: #ff6b6b !important; }
        .custom-card.expired .route-label { color: #ff9999 !important; }
        .custom-card.expired .time-badge { background-color: rgba(139, 0, 0, 0.3) !important; color: #ff6b6b !important; }
        .custom-card.expired .expired-label { color: #ff4444 !important; font-weight: bold; background-color: rgba(255, 0, 0, 0.15); padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; border: 1px solid #ff4444; margin-right: 8px; }
        .custom-card.expired .contact-btn { opacity: 0.5; pointer-events: none; cursor: not-allowed; }
        .custom-card.completed { background-color: var(--completed-bg) !important; border: 2px solid var(--completed-border) !important; }
        .custom-card.completed .route-display { color: #ffb74d !important; }
        .custom-card.completed .route-label { color: #ffcc80 !important; }
        .custom-card.completed .time-badge { background-color: rgba(184, 90, 0, 0.3) !important; color: #ffb74d !important; }
        .custom-card.completed .completed-label { color: #ffb74d !important; font-weight: bold; background-color: rgba(255, 143, 0, 0.15); padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; border: 1px solid #ff8f00; margin-right: 8px; }
        .custom-card.completed .contact-btn { opacity: 0.5; pointer-events: none; cursor: not-allowed; }
        .custom-card.completed .btn-complete { opacity: 0.5; pointer-events: none; cursor: not-allowed; }
        .contact-buttons-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .contact-buttons-container .contact-btn { width: 40px; height: 40px; font-size: 1rem; }
        .delete-timer { color: #ff6b6b; font-size: 0.7rem; margin-top: 4px; display: block; }
        .section-header { color: #81c784; font-size: 1.1rem; font-weight: bold; padding: 10px 0; border-bottom: 2px solid #2E7D32; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .section-header .badge { font-size: 0.8rem; }
        .section-divider { margin: 20px 0; border: 0; border-top: 2px dashed #333; }
        .date-badge { background-color: rgba(46, 125, 50, 0.15); color: #81c784; padding: 2px 10px; border-radius: 6px; font-size: 0.7rem; margin-right: 6px; }
        .expired .date-badge { color: #ff6b6b !important; background-color: rgba(139, 0, 0, 0.2) !important; }
        .completed .date-badge { color: #ffb74d !important; background-color: rgba(184, 90, 0, 0.2) !important; }
        .text-white-50 { color: rgba(255,255,255,0.5) !important; }
        .gap-2 { gap: 0.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-3 { margin-top: 1rem; }
        .mb-0 { margin-bottom: 0; }
        .mb-3 { margin-bottom: 1rem; }
        .mb-4 { margin-bottom: 1.5rem; }
        .p-3 { padding: 1rem; }
        .p-4 { padding: 1.5rem; }
        .p-5 { padding: 3rem; }
        .w-100 { width: 100%; }
        .text-center { text-align: center; }
        .text-success { color: #81c784 !important; }
        .text-muted { color: #6c757d !important; }
        .small { font-size: 0.875rem; }
        .fs-6 { font-size: 1rem; }
        .rounded-pill { border-radius: 50rem; }
        .px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
        .px-3 { padding-left: 1rem; padding-right: 1rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .ms-2 { margin-left: 0.5rem; }
        .ms-auto { margin-left: auto; }
        .me-2 { margin-right: 0.5rem; }
        .d-flex { display: flex; }
        .flex-grow-1 { flex-grow: 1; }
        .justify-content-between { justify-content: space-between; }
        .align-items-center { align-items: center; }
        .align-items-start { align-items: flex-start; }
        .row { display: flex; flex-wrap: wrap; margin: 0 -0.5rem; }
        .col-6 { width: 50%; padding: 0 0.5rem; }
        .col-12 { width: 100%; padding: 0 0.5rem; }
        .g-3 { gap: 1rem; }
        /* Correction pour le formulaire */
        .form-row { display: flex; flex-wrap: wrap; margin: 0 -8px; }
        .form-col { flex: 0 0 50%; max-width: 50%; padding: 0 8px; }
        @media (max-width: 576px) {
            .form-col { flex: 0 0 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay hidden">
        <div class="spinner-border text-success" style="width: 3rem; height: 3rem;"></div>
    </div>

    <div class="app-header">
        <button class="admin-trigger" onclick="toggleAdminMode()" title="دخول المسؤول"><i class="fas fa-shield-alt"></i></button>
        <h2><i class="fas fa-taxi"></i> في طريقك - طلب رحلة</h2>
        <p class="mb-0 small opacity-75">اطلب رحلة / شارك الطريق مع ناس بحالك</p>
    </div>

    <div class="container">
        <!-- Auth Section -->
        <div id="authSection">
            <div class="custom-card p-4">
                <ul class="nav nav-tabs nav-fill mb-3" id="authTab" role="tablist">
                    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">تسجيل الدخول</button></li>
                    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#register">حساب جديد</button></li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="login">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">رقم الهاتف</label>
                                <input type="tel" id="l_phone" class="form-control" placeholder="2126... أو 06..." required>
                                <div class="form-text text-warning small">⚠️ يقبل الأرقام التي تبدأ بـ 212 أو 0</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">كلمة المرور</label>
                                <input type="password" id="l_pass" class="form-control" placeholder="••••••" required>
                            </div>
                            <button type="submit" class="btn btn-success-custom">دخول</button>
                        </form>
                    </div>
                    <div class="tab-pane fade" id="register">
                        <form id="regForm">
                            <div class="mb-3">
                                <label class="form-label">الاسم المستعار (للظهور فقط)</label>
                                <input type="text" id="r_pseudo" class="form-control" placeholder="مثال: مسافر مراكش" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">رقم الهاتف (المعرف الوحيد)</label>
                                <input type="tel" id="r_phone" class="form-control" placeholder="2126... أو 06..." required>
                                <div class="form-text text-warning small">⚠️ يجب أن يبدأ بـ 212 أو 0</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">كلمة المرور</label>
                                <input type="password" id="r_pass" class="form-control" placeholder="أنشئ كلمة مرور" required>
                            </div>
                            <button type="submit" class="btn btn-success-custom">إنشاء حساب</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- App Section -->
        <div id="appSection" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-3 px-2">
                <span class="badge bg-secondary fs-6 py-2">
                    <i class="fas fa-user-circle"></i> <span id="displayUser"></span>
                    <span id="adminBadge" class="badge bg-danger ms-2 hidden">ADMIN</span>
                </span>
                <button onclick="logout()" class="btn btn-sm btn-outline-danger rounded-pill px-3"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>

            <!-- Formulaire de demande de trajet avec 2 champs par ligne -->
            <div id="postFormContainer" class="custom-card p-3 mb-4">
                <h5 class="mb-3 text-success"><i class="fas fa-plus-circle"></i> طلب رحلة داخل مراكش</h5>
                <form id="rideForm">
                    <!-- Ligne 1 : Départ et Destination -->
                    <div class="form-row mb-3">
                        <div class="form-col">
                            <label class="form-label small">من أي حي؟</label>
                            <input type="text" id="fromCity" class="form-control" placeholder="مثال: جليز" required>
                        </div>
                        <div class="form-col">
                            <label class="form-label small">إلى أي حي؟</label>
                            <input type="text" id="toCity" class="form-control" placeholder="مثال: المنارة" required>
                        </div>
                    </div>

                    <!-- Ligne 2 : Date et Heure début -->
                    <div class="form-row mb-3">
                        <div class="form-col">
                            <label class="form-label small">التاريخ</label>
                            <input type="date" id="rideDate" class="form-control" required>
                        </div>
                        <div class="form-col">
                            <label class="form-label small">التوقيت من</label>
                            <input type="time" id="timeFrom" class="form-control" required>
                        </div>
                    </div>

                    <!-- Ligne 3 : Heure fin + Bouton -->
                    <div class="form-row mb-3">
                        <div class="form-col">
                            <label class="form-label small">إلى غاية</label>
                            <input type="time" id="timeTo" class="form-control" required>
                        </div>
                        <div class="form-col">
                            <label class="form-label small">&nbsp;</label>
                            <button type="submit" class="btn btn-success-custom">طلب الرحلة الآن</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="d-flex align-items-center mb-3 px-2">
                <h5 class="m-0"><i class="fas fa-list-ul text-success"></i> الرحلات المطلوبة</h5>
                <span class="badge bg-success ms-2 rounded-pill" id="ridesCount">0</span>
                <button onclick="loadRides()" class="btn btn-sm btn-link text-white ms-auto"><i class="fas fa-sync-alt"></i> تحديث</button>
            </div>
            <div id="ridesList"></div>
        </div>
    </div>

    <div class="app-footer">
        <div style="color: #2E7D32; font-weight: bold;">2026 Ftri9k Marrakech -- Créé Par : M.Seddik ELidrissi</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // =============================================
        // CONFIGURATION
        // =============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxrq_YkoHIOq5JCqP-qR3Tm4dDprtpT_YqOQrPMHwauThjdD9VaIGsXU1ZUkK87urfP/exec';
        
        let currentUser = null;
        let isAdminMode = false;
        let autoDeleteTimers = {};

        // =============================================
        // UNIFORM PHONE
        // =============================================
        function uniformPhone(phone) {
            if (!phone) return '';
            let cleaned = String(phone).replace(/[\s\-\(\)]/g, '');
            if (cleaned.startsWith('0')) {
                cleaned = '212' + cleaned.substring(1);
            }
            if (cleaned.startsWith('212')) {
                if (cleaned.length === 12) return cleaned;
                while (cleaned.length < 12) cleaned += '0';
                return cleaned;
            }
            if (cleaned.startsWith('6') || cleaned.startsWith('7')) {
                return '212' + cleaned;
            }
            return cleaned;
        }

        // =============================================
        // VALIDATE PHONE
        // =============================================
        function validatePhone(phone) {
            const p = uniformPhone(phone);
            return p.length === 12 && p.startsWith('212');
        }

        // =============================================
        // INIT
        // =============================================
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('rideDate').value = today;
        });

        if(sessionStorage.getItem('currentUser')) {
            currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
            showApp();
        }

        // =============================================
        // API POST
        // =============================================
        async function apiPost(payload) {
            document.getElementById('loader').classList.remove('hidden');
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                return true;
            } catch (error) {
                console.error(error);
                Swal.fire('خطأ', 'مشكل في الاتصال بالسيرفر', 'error');
                return false;
            } finally {
                setTimeout(() => document.getElementById('loader').classList.add('hidden'), 800);
            }
        }

        // =============================================
        // REGISTER
        // =============================================
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pseudo = document.getElementById('r_pseudo').value.trim();
            const phone = document.getElementById('r_phone').value.trim();
            const pass = document.getElementById('r_pass').value;

            if (!validatePhone(phone)) {
                Swal.fire('خطأ', 'صيغة الرقم غير صحيحة. أدخل رقماً يبدأ بـ 212 أو 0 (مثال: 212661234567 أو 0612345678)', 'error');
                return;
            }

            const formattedPhone = uniformPhone(phone);

            await apiPost({ 
                action: 'register', 
                pseudo, 
                phone: formattedPhone, 
                password: pass 
            });
            
            Swal.fire({
                icon: 'info',
                title: 'تم إرسال الطلب',
                text: 'إذا كان الرقم غير مسجل، سيتم إنشاء الحساب. حاول تسجيل الدخول الآن.',
                confirmButtonColor: '#2E7D32'
            }).then(() => {
                new bootstrap.Tab(document.querySelector('#authTab button[data-bs-target="#login"]')).show();
                document.getElementById('l_phone').value = formattedPhone;
                document.getElementById('regForm').reset();
            });
        });

        // =============================================
        // LOGIN
        // =============================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('l_phone').value.trim();
            const pass = document.getElementById('l_pass').value;
            
            if (!validatePhone(phone)) {
                Swal.fire('خطأ', 'صيغة الرقم غير صحيحة', 'error');
                return;
            }

            const formattedPhone = uniformPhone(phone);

            document.getElementById('loader').classList.remove('hidden');
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=checkLogin&phone=${encodeURIComponent(formattedPhone)}&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                
                if (data.valid && data.user) {
                    currentUser = data.user;
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showApp();
                    Swal.fire({ icon: 'success', title: `مرحباً ${currentUser.pseudo}!`, timer: 1500, showConfirmButton: false });
                } else {
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'خطأ في تسجيل الدخول', 
                        text: data.message || 'رقم الهاتف أو كلمة المرور غير صحيحة',
                        confirmButtonColor: '#d33'
                    });
                }
            } catch (err) {
                console.error(err);
                Swal.fire('خطأ', 'مشكل في الاتصال بالسيرفر. تأكد من الرابط.', 'error');
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        });

        // =============================================
        // LOGOUT
        // =============================================
        function logout() {
            sessionStorage.removeItem('currentUser');
            isAdminMode = false;
            Object.keys(autoDeleteTimers).forEach(key => {
                clearTimeout(autoDeleteTimers[key]);
            });
            autoDeleteTimers = {};
            location.reload();
        }

        // =============================================
        // SHOW APP
        // =============================================
        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('postFormContainer').classList.remove('hidden');
            document.getElementById('displayUser').innerText = currentUser.pseudo;
            loadRides();
        }

        // =============================================
        // ✅ FORMAT TIME - عرض الوقت الأصلي بدون تحويل
        // =============================================
        function formatTime(timeValue) {
            if (!timeValue) return '--:--';
            
            // تحويل إلى نص
            var timeStr = String(timeValue);
            
            // محاولة استخراج الوقت بصيغة HH:MM من النص
            var match = timeStr.match(/([0-1]?[0-9]|2[0-3]):([0-5][0-9])/);
            if (match) {
                return match[0];
            }
            
            if (timeStr.length >= 5) {
                return timeStr.substring(0, 5);
            }
            
            return '--:--';
        }

        // =============================================
        // GET TIME IN MINUTES
        // =============================================
        function getTimeInMinutes(timeStr) {
            if (!timeStr) return 0;
            var match = String(timeStr).match(/([0-1]?[0-9]|2[0-3]):([0-5][0-9])/);
            if (match) {
                return parseInt(match[1]) * 60 + parseInt(match[2]);
            }
            return 0;
        }

        // =============================================
        // ✅ IS RIDE EXPIRED - الحذف عند وقت timeTo بالضبط
        // =============================================
        function isRideExpired(rideDate, timeTo) {
            if (!rideDate || !timeTo) return false;
            try {
                var match = String(timeTo).match(/([0-1]?[0-9]|2[0-3]):([0-5][0-9])/);
                if (!match) return false;
                var hours = parseInt(match[1]);
                var minutes = parseInt(match[2]);
                var rideDateTime = new Date(rideDate);
                rideDateTime.setHours(hours, minutes, 0, 0);
                var now = new Date();
                // ✅ الحذف عندما يصبح الوقت الحالي >= timeTo (بدون إضافة 30 دقيقة)
                return now >= rideDateTime;
            } catch (e) {
                return false;
            }
        }

        // =============================================
        // CHECK COMPLETED
        // =============================================
        function isRideCompleted(ride) {
            return ride && ride.status === 'completed';
        }

        // =============================================
        // ✅ SCHEDULE AUTO-DELETE - الحذف عند وقت timeTo بالضبط
        // =============================================
        function scheduleAutoDelete(id, rideDate, timeTo) {
            if (autoDeleteTimers[id]) {
                clearTimeout(autoDeleteTimers[id]);
                delete autoDeleteTimers[id];
            }
            try {
                var match = String(timeTo).match(/([0-1]?[0-9]|2[0-3]):([0-5][0-9])/);
                if (!match) return;
                var hours = parseInt(match[1]);
                var minutes = parseInt(match[2]);
                var rideDateTime = new Date(rideDate);
                rideDateTime.setHours(hours, minutes, 0, 0);
                var now = new Date();
                var delayMs = rideDateTime.getTime() - now.getTime();
                
                // إذا كان الوقت قد مضى، نضيف 24 ساعة للجدولة في اليوم التالي (لحالة الرحلات المستقبلية)
                if (delayMs < 0) delayMs += 24 * 60 * 60 * 1000;
                if (delayMs > 24 * 60 * 60 * 1000) delayMs = 24 * 60 * 60 * 1000;
                
                // جدولة الحذف عند وقت timeTo بالضبط
                autoDeleteTimers[id] = setTimeout(async function() {
                    try {
                        var res = await fetch(SCRIPT_URL);
                        var data = await res.json();
                        if (data.status === 'success') {
                            var ride = data.rides.find(function(r) { return r.id === id; });
                            if (ride && ride.status !== 'completed' && isRideExpired(ride.date, ride.timeTo)) {
                                await deleteRide(id, true);
                            }
                        }
                    } catch (err) {
                        console.error('Auto-delete error:', err);
                    }
                }, delayMs);
            } catch (e) {}
        }

        // =============================================
        // COMPLETE RIDE
        // =============================================
        async function completeRide(id) {
            var confirm = await Swal.fire({
                title: 'هل تمت الرحلة؟',
                text: 'سيتم وضع علامة على هذه الرحلة كمكتملة',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ff8f00',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'نعم، تمت الرحلة',
                cancelButtonText: 'إلغاء'
            });
            if(confirm.isConfirmed) {
                await apiPost({ action: 'completeRide', id: id });
                if (autoDeleteTimers[id]) {
                    clearTimeout(autoDeleteTimers[id]);
                    delete autoDeleteTimers[id];
                }
                loadRides();
                Swal.fire({
                    icon: 'success',
                    title: 'تم!',
                    text: 'تم وضع علامة على الرحلة كمكتملة',
                    timer: 2000,
                    showConfirmButton: false
                });
            }
        }

        // =============================================
        // DELETE RIDE
        // =============================================
        async function deleteRide(id, autoDelete) {
            if (autoDelete === undefined) autoDelete = false;
            if (!autoDelete) {
                var msg = isAdminMode ? "هل أنت متأكد من حذف هذا الطلب كمسؤول؟" : "هل أنت متأكد من حذف طلبك؟";
                var confirm = await Swal.fire({ 
                    title: 'تأكيد الحذف؟', 
                    text: msg, 
                    icon: 'warning', 
                    showCancelButton: true, 
                    confirmButtonColor: '#d33', 
                    cancelButtonColor: '#3085d6', 
                    confirmButtonText: 'نعم، احذفه', 
                    cancelButtonText: 'إلغاء' 
                });
                if(!confirm.isConfirmed) return;
            }
            if (autoDeleteTimers[id]) {
                clearTimeout(autoDeleteTimers[id]);
                delete autoDeleteTimers[id];
            }
            await apiPost({ action: 'deleteRide', id: id });
            loadRides();
            if (!autoDelete) {
                Swal.fire('تم الحذف!', '', 'success');
            }
        }

        // =============================================
        // RENDER RIDES
        // =============================================
        function renderRides(rides) {
            var container = document.getElementById('ridesList');
            document.getElementById('ridesCount').innerText = rides.length;
            container.innerHTML = '';

            if(rides.length === 0) {
                container.innerHTML = '<div class="text-center p-5 text-muted"><i class="fas fa-taxi fa-3x mb-3 opacity-25"></i><p>لا توجد طلبات رحلات حالياً</p></div>';
                Object.keys(autoDeleteTimers).forEach(function(key) {
                    clearTimeout(autoDeleteTimers[key]);
                });
                autoDeleteTimers = {};
                return;
            }

            var existingIds = rides.map(function(r) { return r.id; });
            Object.keys(autoDeleteTimers).forEach(function(key) {
                if (!existingIds.includes(parseInt(key))) {
                    clearTimeout(autoDeleteTimers[key]);
                    delete autoDeleteTimers[key];
                }
            });

            var activeRides = [];
            var expiredRides = [];

            rides.forEach(function(r) {
                var completed = isRideCompleted(r);
                var expired = !completed && isRideExpired(r.date, r.timeTo);
                if (completed || expired) {
                    expiredRides.push(r);
                } else {
                    activeRides.push(r);
                    if (!autoDeleteTimers[r.id]) {
                        scheduleAutoDelete(r.id, r.date, r.timeTo);
                    }
                }
            });

            activeRides.sort(function(a, b) {
                return getTimeInMinutes(a.timeFrom) - getTimeInMinutes(b.timeFrom);
            });

            expiredRides.sort(function(a, b) {
                return getTimeInMinutes(b.timeTo) - getTimeInMinutes(a.timeTo);
            });

            if (activeRides.length > 0) {
                container.innerHTML += `
                    <div class="section-header">
                        <span><i class="fas fa-circle text-success" style="font-size: 0.6rem;"></i> الرحلات النشطة</span>
                        <span class="badge bg-success">${activeRides.length}</span>
                    </div>
                `;
                activeRides.forEach(function(r) {
                    container.innerHTML += createRideCard(r, false);
                });
            }

            if (expiredRides.length > 0) {
                container.innerHTML += `
                    <hr class="section-divider">
                    <div class="section-header">
                        <span><i class="fas fa-circle text-danger" style="font-size: 0.6rem;"></i> الرحلات المنتهية</span>
                        <span class="badge bg-danger">${expiredRides.length}</span>
                    </div>
                `;
                expiredRides.forEach(function(r) {
                    container.innerHTML += createRideCard(r, true);
                });
            }
        }

        // =============================================
        // CREATE RIDE CARD
        // =============================================
        function createRideCard(r, isExpiredOrCompleted) {
            var isOwner = currentUser && currentUser.pseudo === r.owner;
            var phoneStr = String(r.phone || '');
            var waLink = 'https://wa.me/' + phoneStr + '?text=' + encodeURIComponent('Salam, cheft talab rihla dyalek mn ' + r.from + ' l ' + r.to + '...');
            
            var tFrom = formatTime(r.timeFrom);
            var tTo = formatTime(r.timeTo);
            
            var displayDate = '';
            if (r.date) {
                try {
                    var d = new Date(r.date);
                    if (!isNaN(d)) {
                        displayDate = d.toLocaleDateString('ar-MA', { weekday: 'short', day: 'numeric', month: 'short' });
                    }
                } catch(e) {}
            }
            
            var completed = isRideCompleted(r);
            var expired = !completed && isRideExpired(r.date, r.timeTo);
            
            var statusClass = '';
            var statusBadge = '';
            var buttonsDisabled = false;
            var completeDisabled = false;

            if (completed) {
                statusClass = 'completed';
                statusBadge = '<span class="completed-label"><i class="fas fa-check-circle"></i> تمت الرحلة</span>';
                buttonsDisabled = true;
                completeDisabled = true;
            } else if (expired) {
                statusClass = 'expired';
                statusBadge = '<span class="expired-label"><i class="fas fa-clock"></i> انتهى الوقت</span>';
                buttonsDisabled = true;
                completeDisabled = false;
            }
            
            var deleteBtnHtml = '';
            if (isOwner) {
                deleteBtnHtml = '<div class="mt-2 text-start"><button onclick="deleteRide(' + r.id + ')" class="btn btn-sm btn-outline-danger rounded-pill px-3"><i class="fas fa-trash-alt"></i> حذف طلبي</button></div>';
            } else if (isAdminMode) {
                deleteBtnHtml = '<button onclick="deleteRide(' + r.id + ')" class="admin-delete-btn"><i class="fas fa-skull-crossbones"></i> حذف كمسؤول</button>';
            }

            var completeBtnHtml = '';
            if ((isOwner || isAdminMode) && !completeDisabled) {
                completeBtnHtml = `
                    <button onclick="completeRide(${r.id})" class="contact-btn btn-complete" title="إنهاء الرحلة">
                        <i class="fas fa-flag-checkered"></i>
                    </button>
                `;
            }

            var timerInfo = '';
            if (!completed && !expired && r.date && r.timeTo) {
                try {
                    var match = String(r.timeTo).match(/([0-1]?[0-9]|2[0-3]):([0-5][0-9])/);
                    if (match) {
                        var hours = parseInt(match[1]);
                        var minutes = parseInt(match[2]);
                        var rideDateTime = new Date(r.date);
                        rideDateTime.setHours(hours, minutes, 0, 0);
                        var now = new Date();
                        var remaining = rideDateTime.getTime() - now.getTime();
                        if (remaining > 0 && remaining < 24 * 60 * 60 * 1000) {
                            var h = Math.floor(remaining / (60 * 60 * 1000));
                            var m = Math.round((remaining % (60 * 60 * 1000)) / (60 * 1000));
                            timerInfo = `
                                <span class="delete-timer">
                                    <i class="fas fa-clock"></i> 
                                    سيتم الحذف تلقائياً عند الساعة ${formatTime(r.timeTo)}
                                    (بعد ${h > 0 ? h + ' ساعة ' : ''}${m} دقيقة)
                                </span>
                            `;
                        }
                    }
                } catch(e) {}
            }

            return `
                <div class="custom-card p-3 ${statusClass}">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <div class="route-display">
                                <span class="route-label">من</span>
                                <span class="text-white">${r.from}</span>
                                <i class="fas fa-long-arrow-alt-left route-arrow"></i>
                                <span class="route-label">إلى</span>
                                <span class="text-success">${r.to}</span>
                                <span class="req-badge"><i class="fas fa-hand-paper"></i> طلب</span>
                                ${statusBadge}
                            </div>
                            <div>
                                <span class="time-badge"><i class="far fa-clock"></i> بين ${tFrom} و ${tTo}</span>
                                ${displayDate ? `<span class="date-badge"><i class="far fa-calendar-alt"></i> ${displayDate}</span>` : ''}
                            </div>
                            <div class="small mt-2 text-white-50"><i class="fas fa-user-circle"></i> ${r.owner}</div>
                            ${timerInfo}
                        </div>
                    </div>
                    
                    <div class="contact-buttons-container">
                        <a href="${waLink}" target="_blank" class="contact-btn btn-whatsapp ${buttonsDisabled ? 'disabled' : ''}" title="واتساب" style="${buttonsDisabled ? 'opacity:0.5;pointer-events:none;' : ''}">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                        <a href="tel:+${phoneStr}" class="contact-btn btn-call ${buttonsDisabled ? 'disabled' : ''}" title="اتصال" style="${buttonsDisabled ? 'opacity:0.5;pointer-events:none;' : ''}">
                            <i class="fas fa-phone"></i>
                        </a>
                        ${completeBtnHtml}
                    </div>
                    
                    ${deleteBtnHtml}
                </div>
            `;
        }

        // =============================================
        // LOAD RIDES - مع تنظيف الأوقات
        // =============================================
        async function loadRides() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                var res = await fetch(SCRIPT_URL);
                var data = await res.json();
                if(data.status === 'success') {
                    var rides = data.rides || [];
                    rides.forEach(function(ride) {
                        if (ride.timeFrom) {
                            var match = String(ride.timeFrom).match(/([0-1]?[0-9]|2[0-3]):([0-5][0-9])/);
                            if (match) {
                                ride.timeFrom = match[0];
                            } else if (String(ride.timeFrom).length >= 5) {
                                ride.timeFrom = String(ride.timeFrom).substring(0, 5);
                            }
                        }
                        if (ride.timeTo) {
                            var match = String(ride.timeTo).match(/([0-1]?[0-9]|2[0-3]):([0-5][0-9])/);
                            if (match) {
                                ride.timeTo = match[0];
                            } else if (String(ride.timeTo).length >= 5) {
                                ride.timeTo = String(ride.timeTo).substring(0, 5);
                            }
                        }
                    });
                    renderRides(rides);
                } else {
                    document.getElementById('ridesList').innerHTML = '<div class="alert alert-warning">خطأ في تحميل البيانات</div>';
                }
            } catch(err) {
                console.error(err);
                document.getElementById('ridesList').innerHTML = '<div class="alert alert-danger">تعذر الاتصال بالسيرفر</div>';
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        // =============================================
        // ADD RIDE
        // =============================================
        document.getElementById('rideForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if(!currentUser) return Swal.fire('خطأ', 'يرجى إعادة تسجيل الدخول', 'error');

            var timeFromRaw = document.getElementById('timeFrom').value;
            var timeToRaw = document.getElementById('timeTo').value;
            var timeFrom = timeFromRaw ? timeFromRaw.substring(0, 5) : '';
            var timeTo = timeToRaw ? timeToRaw.substring(0, 5) : '';

            var ride = {
                action: 'addRide',
                owner: currentUser.pseudo,
                phone: currentUser.phone,
                from: document.getElementById('fromCity').value.trim(),
                to: document.getElementById('toCity').value.trim(),
                date: document.getElementById('rideDate').value,
                timeFrom: timeFrom,
                timeTo: timeTo,
                status: 'active'
            };

            if (!ride.timeFrom || !ride.timeTo) {
                Swal.fire('خطأ', 'يرجى تحديد الوقت بشكل صحيح', 'error');
                return;
            }

            if (ride.timeFrom >= ride.timeTo) {
                Swal.fire('خطأ', 'يجب أن يكون وقت البدء قبل وقت الانتهاء', 'error');
                return;
            }

            var today = new Date().toISOString().split('T')[0];
            if (ride.date < today) {
                Swal.fire('خطأ', 'لا يمكنك طلب رحلة في تاريخ مضى', 'error');
                return;
            }

            await apiPost(ride);
            e.target.reset();
            document.getElementById('rideDate').value = today;
            Swal.fire({ toast:true, position:'top-end', icon:'success', title:'تم طلب الرحلة', showConfirmButton:false, timer:1500 });
            loadRides();
        });

        // =============================================
        // ADMIN MODE
        // =============================================
        function toggleAdminMode() {
            if(isAdminMode) {
                isAdminMode = false;
                document.querySelector('.admin-trigger').classList.remove('active');
                document.getElementById('adminBadge').classList.add('hidden');
                if(currentUser) document.getElementById('postFormContainer').classList.remove('hidden');
                loadRides();
                Swal.fire({ toast:true, position:'top-end', icon:'info', title:'تم الخروج من وضع المسؤول', showConfirmButton:false, timer:1500 });
            } else {
                Swal.fire({
                    title: 'دخول المسؤول',
                    input: 'password',
                    inputLabel: 'أدخل كلمة المرور',
                    confirmButtonText: 'تحقق',
                    confirmButtonColor: '#d32f2f',
                    showCancelButton: true,
                    cancelButtonText: 'إلغاء'
                }).then(function(res) {
                    if(res.value === 'Seddik') {
                        isAdminMode = true;
                        document.querySelector('.admin-trigger').classList.add('active');
                        document.getElementById('adminBadge').classList.remove('hidden');
                        if(!currentUser) {
                            document.getElementById('authSection').classList.add('hidden');
                            document.getElementById('appSection').classList.remove('hidden');
                            document.getElementById('postFormContainer').classList.add('hidden');
                            document.getElementById('displayUser').innerText = "المسؤول";
                        }
                        loadRides();
                        Swal.fire({ toast:true, position:'top-end', icon:'success', title:'مرحباً بك يا Seddik!', showConfirmButton:false, timer:1500 });
                    } else if(res.value !== undefined) {
                        Swal.fire('خطأ', 'كلمة المرور غير صحيحة', 'error');
                    }
                });
            }
        }

        // =============================================
        // CLEANUP TIMERS
        // =============================================
        window.addEventListener('beforeunload', function() {
            Object.keys(autoDeleteTimers).forEach(function(key) {
                clearTimeout(autoDeleteTimers[key]);
            });
        });
    </script>
</body>
</html>
